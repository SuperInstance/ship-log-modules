<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Activity Heatmap</title>
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --border: #1f2937;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --accent: #8b5cf6;
    --heat-0: #161e2e;
    --heat-1: #2d1b4e;
    --heat-2: #4c1d95;
    --heat-3: #7c3aed;
    --heat-4: #a855f7;
    --heat-5: #c084fc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  .heatmap-container {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    overflow-x: auto;
  }
  .heatmap-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .heatmap-header h3 { font-size: 1rem; }
  .heatmap-stats {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .heatmap-stats strong { color: var(--text); }

  .heatmap-grid {
    display: grid;
    grid-template-columns: 30px 1fr;
    gap: 4px;
  }
  .day-labels {
    display: grid;
    grid-template-rows: repeat(7, 1fr);
    gap: 3px;
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: right;
    padding-right: 4px;
    align-items: center;
  }
  .week-columns {
    display: grid;
    grid-template-columns: repeat(53, 1fr);
    gap: 3px;
  }
  .month-labels {
    display: grid;
    grid-template-columns: repeat(53, 1fr);
    gap: 3px;
    font-size: 0.6rem;
    color: var(--text-dim);
    margin-bottom: 4px;
    margin-left: 34px;
  }
  .month-label {
    text-align: center;
  }

  .heat-cell {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    background: var(--heat-0);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .heat-cell:hover {
    transform: scale(1.4);
    z-index: 10;
    box-shadow: 0 0 8px rgba(168,85,247,0.5);
  }
  .heat-cell.level-1 { background: var(--heat-1); }
  .heat-cell.level-2 { background: var(--heat-2); }
  .heat-cell.level-3 { background: var(--heat-3); }
  .heat-cell.level-4 { background: var(--heat-4); }
  .heat-cell.level-5 { background: var(--heat-5); }

  .heat-tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
  }
  .heat-cell:hover .heat-tooltip { opacity: 1; }

  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-end;
    margin-top: 12px;
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .legend-cells {
    display: flex;
    gap: 3px;
  }
  .legend-cell {
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }

  .day-detail {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-top: 12px;
    display: none;
  }
  .day-detail.active { display: block; }
  .day-detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .day-detail-title { font-weight: 600; font-size: 0.9rem; }
  .day-detail-close {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1.2rem;
  }
  .day-entry {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  .day-entry:last-child { border-bottom: none; }
  .day-entry-time { color: var(--accent); font-weight: 500; margin-right: 8px; }
  .day-entry-cat {
    display: inline-block;
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 8px;
    background: var(--border);
    color: var(--text-dim);
    margin-right: 6px;
  }

  .summary-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .summary-card .value { font-size: 1.3rem; font-weight: 700; }
  .summary-card .label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
</style>
</head>
<body>

<div class="summary-cards" id="summary-cards"></div>

<div class="heatmap-container">
  <div class="heatmap-header">
    <h3>🔥 Activity Heatmap</h3>
    <div class="heatmap-stats" id="heatmap-stats"></div>
  </div>
  <div class="month-labels" id="month-labels"></div>
  <div class="heatmap-grid">
    <div class="day-labels" id="day-labels"></div>
    <div class="week-columns" id="heatmap"></div>
  </div>
  <div class="legend">
    <span>Less</span>
    <div class="legend-cells">
      <div class="legend-cell" style="background:var(--heat-0)"></div>
      <div class="legend-cell" style="background:var(--heat-1)"></div>
      <div class="legend-cell" style="background:var(--heat-2)"></div>
      <div class="legend-cell" style="background:var(--heat-3)"></div>
      <div class="legend-cell" style="background:var(--heat-4)"></div>
      <div class="legend-cell" style="background:var(--heat-5)"></div>
    </div>
    <span>More</span>
  </div>
</div>

<div class="day-detail" id="day-detail"></div>

<script>
// ═══════════════════════════════════════════════════════════
// Activity Heatmap — GitHub-style contribution grid
// ═══════════════════════════════════════════════════════════

const LOG_KEY = 'crew_logbook';

function loadEntries() {
  try {
    return JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
  } catch(e) { return []; }
}

function getActivityByDate() {
  const entries = loadEntries();
  const byDate = {};
  entries.forEach(e => {
    if (!e.timestamp) return;
    const date = e.timestamp.split('T')[0];
    byDate[date] = (byDate[date] || 0) + 1;
  });
  return byDate;
}

function getHeatLevel(count) {
  if (count === 0) return 0;
  if (count <= 2) return 1;
  if (count <= 4) return 2;
  if (count <= 6) return 3;
  if (count <= 10) return 4;
  return 5;
}

function render() {
  const activity = getActivityByDate();
  const entries = loadEntries();

  // Generate last 53 weeks (371 days)
  const today = new Date();
  const startDate = new Date(today);
  startDate.setDate(startDate.getDate() - 364);
  // Align to Sunday
  while (startDate.getDay() !== 0) {
    startDate.setDate(startDate.getDate() - 1);
  }

  const weeks = [];
  const monthLabels = [];
  let currentMonth = -1;
  let weekCount = 0;

  for (let w = 0; w < 53; w++) {
    const week = [];
    let monthInWeek = -1;

    for (let d = 0; d < 7; d++) {
      const date = new Date(startDate);
      date.setDate(date.getDate() + w * 7 + d);
      const dateStr = date.toISOString().split('T')[0];

      if (date > today) {
        week.push(null);
      } else {
        const count = activity[dateStr] || 0;
        week.push({ date: dateStr, count, level: getHeatLevel(count) });
        if (date.getMonth() !== monthInWeek) {
          monthInWeek = date.getMonth();
        }
      }
    }

    // Track month labels
    const firstDay = new Date(startDate);
    firstDay.setDate(firstDay.getDate() + w * 7);
    if (firstDay.getMonth() !== currentMonth && firstDay <= today) {
      currentMonth = firstDay.getMonth();
      monthLabels.push({ weekIndex: w, month: currentMonth });
    }

    weeks.push(week);
  }

  // Render month labels
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let monthHtml = '';
  let lastWeekIdx = -1;
  monthLabels.forEach(m => {
    const span = m.weekIndex - lastWeekIdx;
    monthHtml += `<span class="month-label" style="grid-column:${m.weekIndex + 1} / span ${Math.min(span, 5)}">${monthNames[m.month]}</span>`;
    lastWeekIdx = m.weekIndex;
  });
  document.getElementById('month-labels').innerHTML = monthHtml;

  // Render day labels
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('day-labels').innerHTML = dayNames.map(d => `<div>${d}</div>`).join('');

  // Render heatmap cells
  let heatmapHtml = '';
  weeks.forEach((week, wIdx) => {
    week.forEach((day, dIdx) => {
      if (day === null) {
        heatmapHtml += `<div class="heat-cell" style="visibility:hidden"></div>`;
      } else {
        const tooltip = day.count > 0
          ? `${day.count} entr${day.count === 1 ? 'y' : 'ies'} on ${day.date}`
          : `No activity on ${day.date}`;
        heatmapHtml += `<div class="heat-cell level-${day.level}" data-date="${day.date}" data-count="${day.count}"><div class="heat-tooltip">${tooltip}</div></div>`;
      }
    });
  });
  document.getElementById('heatmap').innerHTML = heatmapHtml;

  // Click to see day details
  document.querySelectorAll('.heat-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => {
      const date = cell.dataset.date;
      const count = parseInt(cell.dataset.count);
      showDayDetail(date, count, entries);
    });
  });

  // Stats
  const activeDays = Object.values(activity).filter(c => c > 0).length;
  const totalEntries = entries.length;
  const maxDay = Math.max(...Object.values(activity), 0);
  const avgPerActiveDay = activeDays > 0 ? (totalEntries / activeDays).toFixed(1) : '0';
  const last30 = Object.entries(activity).filter(([d]) => {
    const diff = (today - new Date(d)) / 86400000;
    return diff <= 30;
  }).length;

  document.getElementById('heatmap-stats').innerHTML = `
    <span><strong>${totalEntries}</strong> entries</span>
    <span><strong>${activeDays}</strong> active days</span>
    <span><strong>${maxDay}</strong> best day</span>
    <span>Last 30: <strong>${last30}</strong> days</span>
  `;

  // Summary cards
  document.getElementById('summary-cards').innerHTML = `
    <div class="summary-card">
      <div class="value">${totalEntries}</div>
      <div class="label">Total Entries</div>
    </div>
    <div class="summary-card">
      <div class="value">${activeDays}</div>
      <div class="label">Active Days</div>
    </div>
    <div class="summary-card">
      <div class="value">${avgPerActiveDay}</div>
      <div class="label">Avg / Active Day</div>
    </div>
    <div class="summary-card">
      <div class="value">${maxDay}</div>
      <div class="label">Best Day</div>
    </div>
    <div class="summary-card">
      <div class="value">${last30}</div>
      <div class="label">Last 30 Days</div>
    </div>
  `;
}

function showDayDetail(date, count, entries) {
  const detail = document.getElementById('day-detail');
  const dayEntries = entries.filter(e => e.timestamp?.startsWith(date));

  if (dayEntries.length === 0) {
    detail.innerHTML = `
      <div class="day-detail-header">
        <div class="day-detail-title">${date}</div>
        <button class="day-detail-close" onclick="document.getElementById('day-detail').classList.remove('active')">×</button>
      </div>
      <div style="color:var(--text-dim);font-size:0.875rem">No entries on this day.</div>`;
  } else {
    detail.innerHTML = `
      <div class="day-detail-header">
        <div class="day-detail-title">${date} — ${dayEntries.length} entr${dayEntries.length === 1 ? 'y' : 'ies'}</div>
        <button class="day-detail-close" onclick="document.getElementById('day-detail').classList.remove('active')">×</button>
      </div>
      ${dayEntries.map(e => {
        const time = e.timestamp?.split('T')[1]?.slice(0,5) || '';
        const cat = e.category || (e.text && /catch|caught/i.test(e.text) ? 'catch' : 'observation');
        return `<div class="day-entry">
          <span class="day-entry-time">${time}</span>
          <span class="day-entry-cat">${cat}</span>
          ${e.text?.substring(0, 80) || ''}
          ${e.author ? `<span style="color:var(--text-dim)"> — ${e.author}</span>` : ''}
        </div>`;
      }).join('')}
    `;
  }
  detail.classList.add('active');
}

render();
window.addEventListener('storage', render);
</script>
</body>
</html>
