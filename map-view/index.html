<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a1929" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Ship Log Map</title>

  <!-- Leaflet 1.9 + MarkerCluster, CDN. Pin versions so this works offline-cacheable. -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    /* ============================================================
       Ship Log Map — maritime dark theme
       Designed for: phones at sea, gloved hands, salt spray,
       sunlight glare and night-watch dimness.
       ============================================================ */

    :root {
      --bg:        #0a1929;
      --bg-2:      #0f2540;
      --bg-3:      #163358;
      --panel:     rgba(15, 37, 64, 0.92);
      --border:    rgba(255, 255, 255, 0.10);
      --border-2:  rgba(255, 255, 255, 0.18);
      --text:      #e6f1ff;
      --text-dim:  #9fb3c8;
      --text-mute: #6b8299;
      --accent:    #22d3ee;
      --accent-2:  #06b6d4;
      --danger:    #ef4444;
      --ok:        #10b981;
      --tap:       48px;            /* min tap target */
      --shadow:    0 8px 28px rgba(0,0,0,0.55);
      --radius:    14px;
      --top-h:     56px;
      --bottom-h:  44px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    /* Category palette — mirrored from module.json */
    --cat-catch:       #10b981;
    --cat-maintenance: #f59e0b;
    --cat-weather:     #3b82f6;
    --cat-observation: #9ca3af;
    --cat-navigation:  #a855f7;

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body { display: flex; flex-direction: column; }

    /* ---------- Top bar ---------- */
    .topbar {
      flex: 0 0 auto;
      height: calc(var(--top-h) + var(--safe-top));
      padding: var(--safe-top) 12px 0 12px;
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(180deg, var(--bg-2) 0%, rgba(15,37,64,0.85) 100%);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1000;
      position: relative;
    }
    .topbar h1 {
      flex: 1 1 auto; min-width: 0;
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar h1 .sub {
      font-weight: 400;
      color: var(--text-dim);
      font-size: 12px;
      display: block;
      margin-top: 1px;
    }

    /* ---------- Buttons (big, high-contrast tap targets) ---------- */
    .btn {
      flex: 0 0 auto;
      min-width: var(--tap);
      min-height: var(--tap);
      padding: 0 14px;
      background: var(--bg-3);
      color: var(--text);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      transition: transform 80ms ease, background 120ms ease, border-color 120ms ease;
      -webkit-user-select: none; user-select: none;
    }
    .btn:hover  { background: #1c4068; }
    .btn:active { transform: scale(0.96); background: #1f4a7a; }
    .btn.primary {
      background: var(--accent-2);
      border-color: var(--accent);
      color: #001318;
    }
    .btn.primary:hover { background: var(--accent); }
    .btn.primary:active { background: #0891b2; }
    .btn .label { font-size: 14px; font-weight: 600; }
    .btn.icon-only { padding: 0; width: var(--tap); }

    .btn[aria-pressed="true"] {
      background: var(--accent-2);
      border-color: var(--accent);
      color: #001318;
    }

    /* Spinning refresh icon */
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- Map ---------- */
    #map {
      flex: 1 1 auto;
      width: 100%;
      background: var(--bg);
      /* Don't intercept pinch-zoom except on the map itself */
      touch-action: pan-x pan-y;
    }

    /* ---------- Bottom status bar ---------- */
    .statusbar {
      flex: 0 0 auto;
      min-height: calc(var(--bottom-h) + var(--safe-bot));
      padding: 6px 14px calc(6px + var(--safe-bot)) 14px;
      background: var(--bg-2);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      font-size: 12px;
      color: var(--text-dim);
      z-index: 1000;
      position: relative;
    }
    .statusbar .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-mute);
      flex: 0 0 auto;
      box-shadow: 0 0 0 0 currentColor;
    }
    .statusbar .dot.ok    { background: var(--ok); }
    .statusbar .dot.warn  { background: #f59e0b; }
    .statusbar .dot.err   { background: var(--danger); }
    .statusbar .msg { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .statusbar .count { flex: 0 0 auto; font-variant-numeric: tabular-nums; }

    /* ---------- Filter sidebar (slides over the map) ---------- */
    .sidebar {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: min(360px, 92vw);
      background: var(--panel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow);
      transform: translateX(-105%);
      transition: transform 220ms cubic-bezier(.2,.7,.2,1);
      z-index: 1100;
      display: flex; flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
      overflow: hidden;
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar header {
      flex: 0 0 auto;
      padding: 14px 16px 10px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      flex: 1 1 auto;
    }
    .sidebar .body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 14px 16px 18px;
      -webkit-overflow-scrolling: touch;
    }
    .sidebar .footer {
      flex: 0 0 auto;
      padding: 12px 16px calc(12px + var(--safe-bot));
      border-top: 1px solid var(--border);
      display: flex; gap: 10px;
      background: rgba(10, 25, 41, 0.6);
    }

    .group { margin-bottom: 18px; }
    .group h3 {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-mute);
    }

    .cat-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 8px;
      border-radius: 10px;
      cursor: pointer;
      min-height: var(--tap);
      transition: background 100ms ease;
    }
    .cat-row:hover { background: rgba(255,255,255,0.04); }
    .cat-row:active { background: rgba(255,255,255,0.08); }
    .cat-row .swatch {
      width: 22px; height: 22px;
      border-radius: 50%;
      flex: 0 0 auto;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15), inset 0 0 0 2px rgba(0,0,0,0.25);
    }
    .cat-row .icon { font-size: 18px; flex: 0 0 auto; }
    .cat-row .name { flex: 1 1 auto; font-size: 15px; }
    .cat-row .count { font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .cat-row .check {
      width: 24px; height: 24px;
      border-radius: 6px;
      border: 2px solid var(--border-2);
      display: inline-flex; align-items: center; justify-content: center;
      flex: 0 0 auto;
    }
    .cat-row .check.on { background: var(--accent); border-color: var(--accent); color: #001318; }
    .cat-row .check.on::after {
      content: ""; display: block;
      width: 6px; height: 12px;
      border: solid #001318;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 3px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .field label { font-size: 12px; color: var(--text-dim); }
    .field input, .field select {
      width: 100%;
      min-height: var(--tap);
      padding: 10px 12px;
      background: var(--bg-3);
      color: var(--text);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .field input:focus, .field select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }
    .field input[type="date"] { color-scheme: dark; }
    .field input[type="search"]::-webkit-search-cancel-button {
      -webkit-appearance: none; appearance: none;
      height: 18px; width: 18px;
      background: var(--text-mute);
      mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M19 6.4 17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z'/></svg>") center/contain no-repeat;
      cursor: pointer;
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
      opacity: 0; pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 1050;
    }
    .scrim.on { opacity: 1; pointer-events: auto; }

    /* ---------- Floating action button: locate me ---------- */
    .fab {
      position: absolute;
      right: max(14px, env(safe-area-inset-right));
      bottom: calc(var(--bottom-h) + 18px + var(--safe-bot));
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent-2);
      color: #001318;
      border: none;
      box-shadow: var(--shadow);
      font-size: 24px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 900;
      transition: transform 80ms ease;
    }
    .fab:active { transform: scale(0.93); }
    .fab.busy { background: var(--bg-3); color: var(--text); }
    .fab.busy .ico { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ---------- Marker styles ---------- */
    .pin {
      position: relative;
      width: 32px; height: 40px;
      transform: translate(-50%, -100%);
      pointer-events: auto;
    }
    .pin svg { width: 100%; height: 100%; display: block; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6)); }
    .pin .label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -65%);
      font-size: 14px;
      line-height: 1;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }
    .pin.dim { opacity: 0.35; }

    /* Override Leaflet cluster bubble for dark theme */
    .marker-cluster {
      background-color: rgba(34, 211, 238, 0.18) !important;
    }
    .marker-cluster div {
      background-color: rgba(34, 211, 238, 0.85) !important;
      color: #001318 !important;
      font-weight: 700 !important;
      font-family: inherit !important;
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.25) !important;
    }
    .marker-cluster-small { background-color: rgba(16, 185, 129, 0.18) !important; }
    .marker-cluster-small div { background-color: rgba(16, 185, 129, 0.85) !important; }
    .marker-cluster-medium { background-color: rgba(245, 158, 11, 0.18) !important; }
    .marker-cluster-medium div { background-color: rgba(245, 158, 11, 0.85) !important; }
    .marker-cluster-large { background-color: rgba(168, 85, 247, 0.18) !important; }
    .marker-cluster-large div { background-color: rgba(168, 85, 247, 0.85) !important; }

    /* ---------- Popup styling ---------- */
    .leaflet-popup-content-wrapper {
      background: var(--bg-2);
      color: var(--text);
      border: 1px solid var(--border-2);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 0;
    }
    .leaflet-popup-content {
      margin: 0;
      width: min(280px, 70vw) !important;
      font-family: inherit;
      line-height: 1.4;
    }
    .leaflet-popup-tip { background: var(--bg-2); border: 1px solid var(--border-2); }
    .leaflet-popup-close-button {
      color: var(--text-dim) !important;
      font-size: 24px !important;
      width: 36px !important; height: 36px !important;
      padding: 0 !important;
      display: flex !important; align-items: center; justify-content: center;
    }
    .leaflet-popup-close-button:hover { color: var(--text) !important; background: rgba(255,255,255,0.06); border-radius: 8px; }

    .popup { padding: 12px 14px 14px; }
    .popup .head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .popup .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #001318;
    }
    .popup .when {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }
    .popup .body-text {
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 180px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .popup .meta {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-mute);
      font-variant-numeric: tabular-nums;
    }
    .popup .meta span { display: inline-flex; align-items: center; gap: 4px; }

    /* Leaflet attribution restyle */
    .leaflet-control-attribution {
      background: rgba(10, 25, 41, 0.78) !important;
      color: var(--text-mute) !important;
      font-size: 10px !important;
      padding: 2px 6px !important;
      border-radius: 6px 0 0 0;
    }
    .leaflet-control-attribution a { color: var(--text-dim) !important; }
    .leaflet-control-zoom a {
      background: var(--bg-2) !important;
      color: var(--text) !important;
      border: 1px solid var(--border-2) !important;
      width: 40px !important; height: 40px !important;
      line-height: 40px !important;
      font-size: 22px !important;
    }
    .leaflet-control-zoom a:hover { background: var(--bg-3) !important; }

    /* ---------- Empty state ---------- */
    .empty {
      position: absolute;
      inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 24px;
      pointer-events: none;
      color: var(--text-dim);
      z-index: 500;
    }
    .empty .ico { font-size: 48px; opacity: 0.5; margin-bottom: 12px; }
    .empty .t { font-size: 16px; font-weight: 600; color: var(--text); }
    .empty .s { font-size: 13px; margin-top: 4px; max-width: 280px; }
    .empty.hidden { display: none; }

    /* ---------- Toast ---------- */
    .toast {
      position: absolute;
      left: 50%; bottom: calc(var(--bottom-h) + 24px + var(--safe-bot));
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-3);
      color: var(--text);
      border: 1px solid var(--border-2);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 2000;
      max-width: 80vw;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { background: #4c1d1d; border-color: #7f1d1d; }

    /* ---------- Compact screens: status bar hides subtitle ---------- */
    @media (max-width: 480px) {
      .topbar h1 .sub { display: none; }
      .statusbar { font-size: 11px; gap: 8px; }
    }

    /* ---------- Landscape phones: shorten top bar ---------- */
    @media (max-height: 500px) and (orientation: landscape) {
      :root { --top-h: 48px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .spin, .fab.busy .ico { animation: none; }
      .sidebar, .scrim, .toast, .btn { transition: none; }
    }
  </style>
</head>
<body>

  <header class="topbar" role="banner">
    <button id="btn-filter" class="btn icon-only" aria-label="Open filters" title="Filters">
      <span aria-hidden="true">☰</span>
    </button>
    <h1>
      Ship Log Map
      <span class="sub" id="header-sub">Loading…</span>
    </h1>
    <button id="btn-refresh" class="btn icon-only" aria-label="Refresh entries" title="Refresh">
      <span class="ico" aria-hidden="true">⟳</span>
    </button>
  </header>

  <main style="position: relative; flex: 1 1 auto; display: flex;">
    <div id="map" role="application" aria-label="Map of log entries"></div>

    <!-- Empty state overlay -->
    <div id="empty" class="empty hidden">
      <div class="ico">⚓</div>
      <div class="t" id="empty-title">No log entries yet</div>
      <div class="s" id="empty-sub">Entries with location data will appear here.</div>
    </div>

    <!-- Locate-me FAB -->
    <button id="btn-locate" class="fab" aria-label="Use my position" title="Use my position">
      <span class="ico" aria-hidden="true">📍</span>
    </button>

    <!-- Filter sidebar -->
    <aside id="sidebar" class="sidebar" role="dialog" aria-modal="true" aria-label="Filters">
      <header>
        <h2>Filters</h2>
        <button id="btn-close" class="btn icon-only" aria-label="Close filters">
          <span aria-hidden="true">✕</span>
        </button>
      </header>
      <div class="body">

        <div class="group">
          <h3>Search</h3>
          <div class="field">
            <input id="f-q" type="search" placeholder="Filter entries by text…" autocomplete="off" />
          </div>
        </div>

        <div class="group">
          <h3>Category</h3>
          <div id="cat-list"></div>
        </div>

        <div class="group">
          <h3>Date Range</h3>
          <div class="row2">
            <div class="field">
              <label for="f-from">From</label>
              <input id="f-from" type="date" />
            </div>
            <div class="field">
              <label for="f-to">To</label>
              <input id="f-to" type="date" />
            </div>
          </div>
        </div>

      </div>
      <div class="footer">
        <button id="btn-reset" class="btn" style="flex:1;">
          <span class="label">Reset</span>
        </button>
        <button id="btn-apply" class="btn primary" style="flex:1;">
          <span class="label">Apply</span>
        </button>
      </div>
    </aside>
    <div id="scrim" class="scrim"></div>
  </main>

  <footer class="statusbar" role="status" aria-live="polite">
    <span id="status-dot" class="dot" aria-hidden="true"></span>
    <span id="status-msg" class="msg">Idle</span>
    <span id="status-count" class="count">0 pins</span>
  </footer>

  <div id="toast" class="toast" role="alert" aria-live="assertive"></div>

  <!-- Leaflet + plugins -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script>
  "use strict";

  /* ============================================================
     Config — can be overridden via window.SHIPLOG_CONFIG before
     this script runs, or via a `?api=` query param.
     ============================================================ */
  const CFG = Object.assign({
    apiBase:        "",                                  // same-origin by default
    refreshSeconds: 60,
    defaultZoom:    4,
    defaultCenter:  [20, 0],                             // [lat, lon] — Atlantic-ish
    maxEntries:     5000,
    cacheKey:       "shiplog.map.entries",
    cacheTTLms:     5 * 60 * 1000,
  }, window.SHIPLOG_CONFIG || {});

  // ?api=https://... override
  (function() {
    const u = new URL(location.href);
    const api = u.searchParams.get("api");
    if (api) CFG.apiBase = api.replace(/\/+$/, "");
  })();

  const CATEGORIES = {
    catch:       { color: "#10b981", icon: "🎣", label: "Catch" },
    maintenance: { color: "#f59e0b", icon: "🔧", label: "Maintenance" },
    weather:     { color: "#3b82f6", icon: "🌊", label: "Weather" },
    observation: { color: "#9ca3af", icon: "👁",  label: "Observation" },
    navigation:  { color: "#a855f7", icon: "🧭", label: "Navigation" },
  };

  const apiUrl = (path) => CFG.apiBase + path;

  /* ============================================================
     Tiny utilities
     ============================================================ */
  const $  = (sel) => document.querySelector(sel);
  const $$ = (sel) => Array.from(document.querySelectorAll(sel));

  function escapeHtml(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function fmtTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return String(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60)        return "just now";
    if (diff < 3600)      return Math.floor(diff/60) + "m ago";
    if (diff < 86400)     return Math.floor(diff/3600) + "h ago";
    if (diff < 86400 * 7) return Math.floor(diff/86400) + "d ago";
    return d.toLocaleDateString(undefined, { month:"short", day:"numeric" });
  }
  function fmtAbs(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return String(iso);
    return d.toLocaleString(undefined, {
      year:"numeric", month:"short", day:"numeric",
      hour:"2-digit", minute:"2-digit"
    });
  }
  function fmtCoord(lat, lon) {
    const f = (v, pos, neg) => `${Math.abs(v).toFixed(3)}° ${v >= 0 ? pos : neg}`;
    return `${f(lat,"N","S")}, ${f(lon,"E","W")}`;
  }

  function toast(msg, kind) {
    const el = $("#toast");
    el.textContent = msg;
    el.classList.toggle("err", kind === "err");
    el.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove("show"), 2400);
  }

  function setStatus(msg, kind /* "ok"|"warn"|"err"|undefined */) {
    $("#status-msg").textContent = msg;
    const d = $("#status-dot");
    d.classList.remove("ok","warn","err");
    if (kind) d.classList.add(kind);
  }

  function setHeaderSub(msg) { $("#header-sub").textContent = msg; }

  /* ============================================================
     Map setup
     ============================================================ */
  const map = L.map("map", {
    zoomControl: true,
    worldCopyJump: true,
    preferCanvas: false,            // divIcon markers need this off
    tap: true,
    attributionControl: true,
  }).setView(CFG.defaultCenter, CFG.defaultZoom);

  // CartoDB Dark Matter
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors · © <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: "abcd",
    maxZoom: 19,
  }).addTo(map);

  // Cluster group
  const cluster = L.markerClusterGroup({
    showCoverageOnHover: false,
    spiderfyOnMaxZoom: true,
    chunkedLoading: true,
    maxClusterRadius: 60,
    iconCreateFunction: (c) => {
      const count = c.getChildCount();
      const size = count < 10 ? "small" : count < 100 ? "medium" : "large";
      return L.divIcon({
        html: `<div><span>${count}</span></div>`,
        className: `marker-cluster marker-cluster-${size}`,
        iconSize: L.point(40, 40),
      });
    },
  });
  map.addLayer(cluster);

  // "You are here" indicator
  let youMarker = null;
  let youAccuracy = null;

  /* ============================================================
     Pin icon factory
     ============================================================ */
  function makePinIcon(category, opts = {}) {
    const cat = CATEGORIES[category] || CATEGORIES.observation;
    const dim = opts.dim ? "dim" : "";
    // SVG drop-pin: filled with category color, dark stroke for contrast
    const svg = `
      <svg viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="g-${escapeAttr(category)}" cx="50%" cy="40%" r="55%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
            <stop offset="100%" stop-color="${cat.color}"/>
          </radialGradient>
        </defs>
        <path d="M16 1 C7.7 1 1 7.6 1 15.7 C1 26 16 39 16 39 S31 26 31 15.7 C31 7.6 24.3 1 16 1 Z"
              fill="url(#g-${escapeAttr(category)})"
              stroke="rgba(0,0,0,0.85)" stroke-width="1.5"/>
        <circle cx="16" cy="15.7" r="9" fill="rgba(0,0,0,0.45)"/>
      </svg>`;
    return L.divIcon({
      className: `pin ${dim}`,
      html: `<div class="pin-inner">${svg}<span class="label">${cat.icon}</span></div>`,
      iconSize: [32, 40],
      iconAnchor: [16, 40],
      popupAnchor: [0, -36],
    });
  }

  /* ============================================================
     Popup rendering
     ============================================================ */
  function renderPopup(entry) {
    const cat = CATEGORIES[entry.category] || CATEGORIES.observation;
    const text = escapeHtml(entry.text || entry.body || entry.message || "(no text)");
    const when = fmtTime(entry.timestamp || entry.created_at || entry.ts);
    const abs  = fmtAbs(entry.timestamp || entry.created_at || entry.ts);
    const lat  = Number(entry.lat);
    const lon  = Number(entry.lon ?? entry.lng);
    const meta = [];
    if (Number.isFinite(lat) && Number.isFinite(lon)) {
      meta.push(`<span title="${escapeAttr(fmtCoord(lat, lon))}">📍 ${lat.toFixed(3)}, ${lon.toFixed(3)}</span>`);
    }
    if (entry.depth != null) meta.push(`<span>📏 ${entry.depth}m</span>`);
    if (entry.speed != null) meta.push(`<span>💨 ${entry.speed}kn</span>`);
    if (entry.species)       meta.push(`<span>🐟 ${escapeHtml(entry.species)}</span>`);

    return `
      <div class="popup">
        <div class="head">
          <span class="badge" style="background:${cat.color}">
            <span aria-hidden="true">${cat.icon}</span> ${escapeHtml(cat.label)}
          </span>
          <span class="when" title="${escapeAttr(abs)}">${escapeHtml(when)}</span>
        </div>
        <div class="body-text">${text}</div>
        ${meta.length ? `<div class="meta">${meta.join("")}</div>` : ""}
      </div>`;
  }

  /* ============================================================
     State
     ============================================================ */
  const state = {
    entries: [],            // raw from API
    visible: [],            // after filters
    filters: {
      cats: new Set(Object.keys(CATEGORIES)),
      q: "",
      from: null,           // ISO date string (yyyy-mm-dd)
      to:   null,
    },
    bounds: null,           // last fit bounds
    lastRefresh: 0,
  };

  // Build category list in sidebar
  const catListEl = $("#cat-list");
  Object.entries(CATEGORIES).forEach(([key, c]) => {
    const row = document.createElement("div");
    row.className = "cat-row";
    row.dataset.cat = key;
    row.innerHTML = `
      <span class="swatch" style="background:${c.color}"></span>
      <span class="icon" aria-hidden="true">${c.icon}</span>
      <span class="name">${escapeHtml(c.label)}</span>
      <span class="count" data-count="${key}">0</span>
      <span class="check on" aria-hidden="true"></span>`;
    row.addEventListener("click", () => {
      const on = row.querySelector(".check").classList.toggle("on");
      if (on) state.filters.cats.add(key); else state.filters.cats.delete(key);
      applyFilters();
    });
    catListEl.appendChild(row);
  });

  /* ============================================================
     Filtering
     ============================================================ */
  function applyFilters() {
    const { cats, q, from, to } = state.filters;
    const qLower = (q || "").trim().toLowerCase();
    const fromTs = from ? new Date(from + "T00:00:00").getTime() : -Infinity;
    const toTs   = to   ? new Date(to   + "T23:59:59").getTime() : Infinity;

    state.visible = state.entries.filter((e) => {
      const c = e.category || "observation";
      if (!cats.has(c)) return false;

      const ts = e.timestamp || e.created_at || e.ts || null;
      const t  = ts ? new Date(ts).getTime() : null;
      if (t != null && !isNaN(t)) {
        if (t < fromTs || t > toTs) return false;
      }
      if (qLower) {
        const hay = (e.text || e.body || e.message || "").toLowerCase();
        if (!hay.includes(qLower)) return false;
      }
      return true;
    });

    renderMarkers();
    updateCountByCategory();
    $("#status-count").textContent =
      state.visible.length === state.entries.length
        ? `${state.visible.length} pins`
        : `${state.visible.length} / ${state.entries.length} pins`;
  }

  function updateCountByCategory() {
    const counts = {};
    for (const e of state.entries) {
      const c = e.category || "observation";
      counts[c] = (counts[c] || 0) + 1;
    }
    $$(".cat-row .count").forEach((el) => {
      el.textContent = counts[el.dataset.count] || 0;
    });
  }

  /* ============================================================
     Marker rendering
     ============================================================ */
  function renderMarkers() {
    cluster.clearLayers();
    const latlngs = [];
    for (const entry of state.visible) {
      const lat = Number(entry.lat);
      const lon = Number(entry.lon ?? entry.lng);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) continue;
      latlngs.push([lat, lon]);

      const cat = entry.category || "observation";
      const m = L.marker([lat, lon], { icon: makePinIcon(cat) });
      m.bindPopup(renderPopup(entry), {
        maxWidth: 320,
        autoPan: true,
        autoPanPadding: [40, 40],
      });
      m.on("popupopen", (ev) => {
        // close button enlargement for touch
        const btn = ev.popup.getElement().querySelector(".leaflet-popup-close-button");
        if (btn) btn.setAttribute("aria-label", "Close");
      });
      cluster.addLayer(m);
    }
    // Empty state
    const empty = $("#empty");
    if (state.entries.length === 0) {
      empty.classList.remove("hidden");
      $("#empty-title").textContent = "No log entries yet";
      $("#empty-sub").textContent = "Entries with location data will appear here.";
    } else if (state.visible.length === 0) {
      empty.classList.remove("hidden");
      $("#empty-title").textContent = "No entries match filters";
      $("#empty-sub").textContent = "Try widening the date range or enabling more categories.";
    } else {
      empty.classList.add("hidden");
    }
    return latlngs;
  }

  /* ============================================================
     Fetching entries
     ============================================================ */
  async function fetchEntries() {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 12000);
    setStatus("Loading entries…");
    try {
      const url = apiUrl(`/api/timeline?k=${encodeURIComponent(CFG.maxEntries)}`);
      const res = await fetch(url, {
        signal: ctrl.signal,
        headers: { "Accept": "application/json" },
        credentials: "same-origin",
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();

      // Tolerate a few shapes: array, {entries:[...]}, {items:[...]}
      let entries;
      if (Array.isArray(data)) entries = data;
      else if (Array.isArray(data.entries)) entries = data.entries;
      else if (Array.isArray(data.items)) entries = data.items;
      else if (Array.isArray(data.results)) entries = data.results;
      else throw new Error("Unexpected response shape");

      state.entries = entries;
      state.lastRefresh = Date.now();

      // Cache for offline
      try {
        localStorage.setItem(CFG.cacheKey, JSON.stringify({
          ts: state.lastRefresh,
          entries,
        }));
      } catch (_) { /* quota or disabled — ignore */ }

      setStatus(`Loaded ${entries.length} entries`, entries.length ? "ok" : "warn");
      setHeaderSub(`${entries.length} entries · ${new Date().toLocaleTimeString()}`);
      applyFilters();
    } catch (err) {
      // Try cache fallback
      const cached = loadCache();
      if (cached && cached.entries && cached.entries.length) {
        state.entries = cached.entries;
        setStatus(`Offline · showing ${cached.entries.length} cached entries`, "warn");
        setHeaderSub(`Cached · ${fmtTime(cached.ts)}`);
        applyFilters();
        toast("Connection lost — showing cached data", "err");
      } else {
        setStatus("Failed to load: " + err.message, "err");
        setHeaderSub("Offline");
        toast("Could not reach ship-log-search", "err");
      }
    } finally {
      clearTimeout(timer);
    }
  }

  function loadCache() {
    try {
      const raw = localStorage.getItem(CFG.cacheKey);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (!obj || typeof obj !== "object") return null;
      if (Date.now() - (obj.ts || 0) > CFG.cacheTTLms * 12) return null; // stale by 12x
      return obj;
    } catch (_) { return null; }
  }

  /* ============================================================
     Refresh control
     ============================================================ */
  const refreshBtn = $("#btn-refresh");
  const refreshIco = refreshBtn.querySelector(".ico");
  let refreshTimer = null;
  let countdownTimer = null;
  let nextRefreshAt = 0;

  async function manualRefresh() {
    refreshIco.classList.add("spin");
    refreshBtn.disabled = true;
    await fetchEntries();
    scheduleNextRefresh();
    refreshIco.classList.remove("spin");
    refreshBtn.disabled = false;
  }
  refreshBtn.addEventListener("click", manualRefresh);

  function scheduleNextRefresh() {
    clearTimeout(refreshTimer);
    clearInterval(countdownTimer);
    nextRefreshAt = Date.now() + CFG.refreshSeconds * 1000;
    refreshTimer = setTimeout(() => {
      fetchEntries().then(scheduleNextRefresh);
    }, CFG.refreshSeconds * 1000);
    countdownTimer = setInterval(() => {
      const s = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
      const msg = `${state.entries.length} entries · refresh in ${s}s`;
      setHeaderSub(msg);
    }, 1000);
  }

  /* ============================================================
     Filters sidebar
     ============================================================ */
  const sidebar  = $("#sidebar");
  const scrim    = $("#scrim");

  function openSidebar()  {
    sidebar.classList.add("open");
    scrim.classList.add("on");
    scrim.setAttribute("aria-hidden", "false");
    $("#btn-filter").setAttribute("aria-expanded", "true");
    // Reflect current state in inputs
    $("#f-q").value = state.filters.q || "";
    $("#f-from").value = state.filters.from || "";
    $("#f-to").value   = state.filters.to   || "";
  }
  function closeSidebar() {
    sidebar.classList.remove("open");
    scrim.classList.remove("on");
    scrim.setAttribute("aria-hidden", "true");
    $("#btn-filter").setAttribute("aria-expanded", "false");
  }
  $("#btn-filter").addEventListener("click", openSidebar);
  $("#btn-close").addEventListener("click", closeSidebar);
  scrim.addEventListener("click", closeSidebar);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && sidebar.classList.contains("open")) closeSidebar();
  });

  $("#f-q").addEventListener("input", (e) => {
    state.filters.q = e.target.value;
    applyFilters();
  });
  $("#f-from").addEventListener("change", (e) => {
    state.filters.from = e.target.value || null;
    applyFilters();
  });
  $("#f-to").addEventListener("change", (e) => {
    state.filters.to = e.target.value || null;
    applyFilters();
  });
  $("#btn-apply").addEventListener("click", () => {
    state.filters.q    = $("#f-q").value || "";
    state.filters.from = $("#f-from").value || null;
    state.filters.to   = $("#f-to").value || null;
    applyFilters();
    closeSidebar();
    toast("Filters applied");
  });
  $("#btn-reset").addEventListener("click", () => {
    state.filters.cats = new Set(Object.keys(CATEGORIES));
    state.filters.q = "";
    state.filters.from = null;
    state.filters.to = null;
    $$(".cat-row").forEach((r) => r.querySelector(".check").classList.add("on"));
    $("#f-q").value = "";
    $("#f-from").value = "";
    $("#f-to").value = "";
    applyFilters();
    closeSidebar();
    toast("Filters reset");
  });

  /* ============================================================
     Locate me
     ============================================================ */
  const locateBtn = $("#btn-locate");
  locateBtn.addEventListener("click", () => {
    if (!("geolocation" in navigator)) {
      toast("Geolocation not supported", "err");
      return;
    }
    locateBtn.classList.add("busy");
    navigator.geolocation.getCurrentPosition((pos) => {
      const { latitude, longitude, accuracy } = pos.coords;
      const here = [latitude, longitude];
      map.flyTo(here, Math.max(map.getZoom(), 13), { duration: 0.8 });

      if (youMarker) { map.removeLayer(youMarker); youMarker = null; }
      if (youAccuracy) { map.removeLayer(youAccuracy); youAccuracy = null; }

      youAccuracy = L.circle(here, {
        radius: accuracy || 50,
        color: "#22d3ee",
        weight: 1,
        fillColor: "#22d3ee",
        fillOpacity: 0.12,
      }).addTo(map);

      youMarker = L.circleMarker(here, {
        radius: 7,
        color: "#001318",
        weight: 2,
        fillColor: "#22d3ee",
        fillOpacity: 1,
      }).addTo(map).bindPopup(
        `<div class="popup">
           <div class="head">
             <span class="badge" style="background:#22d3ee;color:#001318">📍 You</span>
             <span class="when">±${Math.round(accuracy || 0)}m</span>
           </div>
           <div class="body-text">${escapeHtml(fmtCoord(latitude, longitude))}</div>
         </div>`
      );

      locateBtn.classList.remove("busy");
      toast(`Centered on your position · ±${Math.round(accuracy || 0)}m`);
    }, (err) => {
      locateBtn.classList.remove("busy");
      toast("Location: " + (err.message || "denied"), "err");
    }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });
  });

  /* ============================================================
     Lifecycle
     ============================================================ */
  // Resize fix for Leaflet when address-bar collapses on mobile
  setTimeout(() => map.invalidateSize(), 100);
  window.addEventListener("resize", () => map.invalidateSize());

  // Visibility — pause refresh when hidden
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      clearTimeout(refreshTimer);
      clearInterval(countdownTimer);
    } else if (nextRefreshAt) {
      const remaining = Math.max(0, nextRefreshAt - Date.now());
      refreshTimer = setTimeout(() => {
        fetchEntries().then(scheduleNextRefresh);
      }, remaining);
      countdownTimer = setInterval(() => {
        const s = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
        setHeaderSub(`${state.entries.length} entries · refresh in ${s}s`);
      }, 1000);
    }
  });

  // First load
  (async () => {
    setStatus("Starting…");
    await fetchEntries();
    scheduleNextRefresh();
  })();

  // Expose a tiny API for the host page or other modules
  window.ShipLogMap = {
    refresh: manualRefresh,
    setFilters: (f) => { Object.assign(state.filters, f); applyFilters(); },
    on: (event, fn) => {
      // simple event bus: "loaded", "filtered"
      (window.ShipLogMap._bus ||= {})[event] ||= [];
      window.ShipLogMap._bus[event].push(fn);
    },
    _emit: (event, payload) => {
      const subs = window.ShipLogMap._bus?.[event] || [];
      subs.forEach((fn) => { try { fn(payload); } catch (_) {} });
    },
  };

  // Emit loaded event
  const origApply = applyFilters;
  // (no-op wiring point for future hooks)

  </script>
</body>
</html>
